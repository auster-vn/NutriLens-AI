name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r apps/api/requirements.txt
      - run: ruff check apps/api
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint:web
      - run: npm run build:web
      - run: npm audit --omit=dev --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: pip install -r apps/api/requirements.txt
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm --workspace apps/web run test:e2e

  containers:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f apps/api/Dockerfile -t nutrilens-api .
      - run: docker build -f apps/web/Dockerfile -t nutrilens-web .
