[build]
  command = "npm run build:web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_PUBLIC_API_BASE_URL = ""

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/api/*"
  to = "https://nutrilens-ai-zc6y.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health/*"
  to = "https://nutrilens-ai-zc6y.onrender.com/health/:splat"
  status = 200
  force = true
